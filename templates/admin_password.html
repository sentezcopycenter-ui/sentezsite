<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin | Şifre Değiştir</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body class="admin">
  <header class="topbar">
    <div class="container topbar-inner">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">
          <img class="brand-logo" src="/static/img/sentez-mascot.png" alt="Sentez mascot">
        </div>
        <div class="brand-text">
          <div class="brand-title">Admin Panel</div>
          <div class="brand-sub">Şifre değiştir</div>
        </div>
      </div>
      <nav class="nav">
        <a class="pill" href="/admin">Siparişler</a>
        <a class="pill" href="/admin/prices">Fiyatlar</a>
        <a class="pill" href="/admin/logout">Çıkış</a>
        <a class="pill" href="/">Siteye dön</a>
      </nav>
    </div>
  </header>

  <main class="section">
    <div class="container" style="max-width:620px">
      <div class="card pad">
        <h2 style="margin-top:0">Admin Şifresini Değiştir</h2>
        {% if error %}
          <div class="note warn" style="margin:10px 0">{{ error }}</div>
        {% endif %}
        {% if msg %}
          <div class="note ok" style="margin:10px 0">{{ msg }}</div>
        {% endif %}

        <form method="post" action="/admin/password">
          <label class="lbl">Mevcut Şifre</label>
          <input class="input" type="password" name="old_password" required>

          <div style="height:10px"></div>

          <label class="lbl">Yeni Şifre</label>
          <input class="input" type="password" name="new_password" minlength="4" required>

          <div style="height:10px"></div>

          <label class="lbl">Yeni Şifre (Tekrar)</label>
          <input class="input" type="password" name="new_password2" minlength="4" required>

          <div style="height:14px"></div>
          <button class="btn primary" type="submit">Şifreyi Güncelle</button>
        </form>

        <div class="note" style="margin-top:14px">
          İpucu: Şifreyi unutursan <code>.env</code> dosyasına <b>ADMIN_PASSWORD</b> yazarak varsayılanı belirleyebilirsin (ilk kurulumda).
        </div>
      </div>
    </div>
  </main>
</body>
</html>
